<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    padding: 12px;
    padding-top: max(12px, env(safe-area-inset-top));
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    color: #fff;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .header h1 { font-size: 1.4rem; font-weight: 800; flex: 1; letter-spacing: 0.3px; }
  .header .club { font-size: 11px; opacity: 0.7; font-weight: 600; }
  .role-badge {
    font-size: 10px; font-weight: 800; padding: 4px 9px;
    border-radius: 12px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .role-admin { background: #dc2626; color: #fff; }
  .role-fc    { background: #ca8a04; color: #fff; }
  .role-spec  { background: #475569; color: #fff; }

  /* ===== BOUTONS GENERIQUES ===== */
  .btn-primary {
    width: 100%; padding: 16px; background: #ffd54f; color: #1e3c72;
    border: none; border-radius: 12px; font-size: 17px; font-weight: 700;
    cursor: pointer; margin-bottom: 14px;
  }
  .btn-secondary {
    padding: 12px; border: none; border-radius: 12px;
    background: rgba(255,255,255,0.15); color: #fff; font-weight: 600;
    font-size: 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.25);
  }
  .btn-secondary:active { background: rgba(255,255,255,0.3); }

  /* ===== CARTES ===== */
  .card {
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .card h2 { font-size: 16px; margin-bottom: 12px; font-weight: 700; }
  .card .hint { font-size: 11px; opacity: 0.75; margin-top: 8px; line-height: 1.4; }

  /* ===== INPUTS ===== */
  input.field {
    width: 100%; padding: 14px 16px; border: none; border-radius: 12px;
    font-size: 16px; background: rgba(255,255,255,0.95); color: #222;
  }
  input.field:focus { outline: 2px solid #ffd54f; }
  input.code-field {
    text-align: center; letter-spacing: 4px; text-transform: uppercase;
    font-family: 'Courier New', monospace; font-weight: 700; font-size: 18px;
  }
  .lbl {
    font-size: 11px; font-weight: 700; opacity: 0.85;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-top: 14px; margin-bottom: 6px;
  }
  .row-flex { display: flex; gap: 8px; }
  .row-flex > input { flex: 1; }

  /* ===== JOUEURS ===== */
  .player {
    background: rgba(255,255,255,0.12); border-radius: 14px;
    padding: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.15);
  }
  .player.won { background: rgba(74,222,128,0.18); border-color: rgba(74,222,128,0.5); }
  .row { display: flex; align-items: center; gap: 8px; }
  .row + .row { margin-top: 8px; }
  .player-name {
    flex: 1; background: transparent; border: none; color: #fff;
    font-size: 16px; font-weight: 700; padding: 4px 4px; min-width: 0;
  }
  .player-name:focus { outline: none; background: rgba(255,255,255,0.1); border-radius: 6px; }
  .player-name[readonly] { pointer-events: none; }
  .group {
    display: flex; align-items: center; gap: 5px; flex: 1;
    background: rgba(0,0,0,0.2); border-radius: 11px; padding: 4px;
  }
  .label {
    font-size: 10px; text-transform: uppercase; opacity: 0.8; font-weight: 700;
    letter-spacing: 0.5px; padding-left: 5px; flex-shrink: 0;
  }
  .display {
    flex: 1; text-align: center; font-size: 15px; font-weight: 800;
    padding: 5px 3px; letter-spacing: 0.3px;
  }
  .hole-display { color: #fff; }
  .score-up { color: #4ade80; }
  .score-down { color: #f87171; }
  .score-as { color: #fbbf24; }
  .score-won { color: #22c55e; font-size: 13px; }
  .btn {
    width: 34px; height: 34px; border: none; border-radius: 50%;
    font-size: 20px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0;
  }
  .btn-up { background: #16a34a; }
  .btn-up:active { background: #15803d; transform: scale(0.92); }
  .btn-down { background: #dc2626; }
  .btn-down:active { background: #b91c1c; transform: scale(0.92); }
  .btn-hole { background: #475569; }
  .btn-hole:active { background: #334155; transform: scale(0.92); }
  .btn-trophy {

  .btn-trophy:active { transform: scale(0.92); }
  .btn-del { background: rgba(255,255,255,0.15); width: 28px; height: 28px; font-size: 13px; }
  .btn-del:active { background: rgba(255,255,255,0.3); }

  /* ===== BANNIÈRE iOS ===== */
  #install-banner {

              font-size: 12px; line-height: 1.5; }

  .toast {

    padding: 12px 22px; border-radius: 30px; font-size: 14px; font-weight: 600;
    z-index: 10000; opacity: 0; transition: all 0.3s; pointer-events: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .empty { text-align: center; padding: 40px 20px; opacity: 0.7; font-style: italic; }
  .small-link {
    color: #ffd54f; font-size: 12px; text-decoration: underline;
    background: none; border: none; cursor: pointer; padding: 4px;
  }
</style>

<script>
/* ============================================================
   CONFIGURATION FIREBASE
   ============================================================ */
var firebaseConfig = {
  apiKey: "AIzaSyAuXW6oBiNPw4W4lZoLPqjpVlLLwA6rt5Q",
  authDomain: "verbruggen-planning.firebaseapp.com",
  databaseURL: "https://verbruggen-planning-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "verbruggen-planning",
  storageBucket: "verbruggen-planning.firebasestorage.app",
  messagingSenderId: "506403938885",
  appId: "1:506403938885:web:2dccdff0b8457036c4392c"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db = firebase.database();

/* ============================================================
   CONCEPTS
   ============================================================
   Tout est rangé sous un "club" dans Firebase :
     /golfClubs/{clubId}
       ├─ name           : "RWGC"
       ├─ adminCode      : "ABCD42"   (4 lettres + 2 chiffres)
       ├─ dayDate        : "2026-04-27"  (date de la journée IC en cours)
       ├─ dayTitle       : "Journée du 27 avril"  (libre)
       ├─ ics/{icId}
       │    ├─ name      : "Men 4 vs Hasselt"
       │    ├─ fcCode    : "MEN4"     (4 lettres)
       │    ├─ nbMatches : 5..7
       │    └─ players/{pid}
       │         ├─ name  : "Francis"
       │         ├─ score : -2..+5
       │         ├─ hole  : 0..18
       │         ├─ won   : true/false
       │         └─ order : 1..N

   URLs :
     ?c=clubId           → spectateur (par défaut)
     ?c=clubId&fc=MEN4   → fore caddy d'un IC
     ?c=clubId&a=ABCD42  → super-admin

   Workflow :
     - Admin crée le club une seule fois
     - Pour chaque journée IC : admin crée plusieurs rencontres, donne les codes FC
     - À la fin : admin clique "Nouvelle journée" → tout est effacé sauf club & code admin
============================================================ */

var state = {
  clubId: null,
  clubName: null,
  dayDate: null,       // "2026-04-27"
  dayTitle: null,      // ex "Journée du 27 avril"
  adminCode: null,
  fcCode: null,
  role: 'none',        // 'admin' | 'fc' | 'spec' | 'none'
  ics: {},
  currentIcId: null,
  fcViewingIc: null,   // pour le FC qui navigue entre les IC
  clubRef: null
};

var appEl = document.getElementById('app');

/* ============================================================
   UTILS
   ============================================================ */
function rand(chars, n) {
  var s = '';
  for (var i = 0; i < n; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
function genCode4()    { return rand('ABCDEFGHJKMNPQRSTUVWXYZ23456789', 4); }
function genCode6()    { return genCode4() + rand('0123456789', 2); }
function genClubId()   { return 'C' + Date.now().toString(36) + rand('abcdefghjkmnpqrstuvwxyz23456789', 4); }
function genIcId()     { return 'I' + Date.now().toString(36) + rand('abcdefghjkmnpqrstuvwxyz23456789', 3); }

function formatScore(s) {
  if (!s || s === 0) return { text: 'AS', cls: 'score-as' };
  if (s > 0)         return { text: s + ' UP', cls: 'score-up' };
  return               { text: Math.abs(s) + ' DN', cls: 'score-down' };
}

/* Score général d'un IC : 1pt par joueur "won", 0,5 par AS si fini, sinon projeté UP/DN
   Mais comme on suit le live : projection = nb UP + 0,5 par AS du côté nous */
function computeIcScore(ic) {
  var n = ic.nbMatches || (ic.players ? Object.keys(ic.players).length : 0);
  var us = 0, them = 0;
  if (!ic.players) return { us: 0, them: n, total: n, win: false, lose: true, tie: false, allDone: false };
  var done = 0, totalPlayers = Object.keys(ic.players).length;
  for (var pid in ic.players) {
    var p = ic.players[pid];
    if (p.won) { us += 1; done++; }
    else if (p.score === 0 && p.hole >= 18) { us += 0.5; them += 0.5; done++; }
    else {
      // Match en cours : projection optimiste / pessimiste
      // On compte 1 si UP, 0 si DN, 0.5 si AS
      if ((p.score || 0) > 0)      us   += 1;     // projeté en notre faveur
      else if ((p.score || 0) < 0) them += 1;     // projeté en leur faveur
      else                         { us += 0.5; them += 0.5; } // AS projeté
    }
  }
  var total = n;
  var us2 = Math.round(us * 2) / 2;
  var them2 = total - us2;
  return {
    us: us2, them: them2, total: total,
    win:  us2 > total / 2,
    lose: us2 < total / 2,
    tie:  us2 === total / 2,
    allDone: done === totalPlayers && totalPlayers > 0
  };
}
function fmtScoreVal(v) {
  return Math.round(v * 2) / 2 === Math.floor(v) ? String(Math.floor(v)) : (Math.floor(v) + '½');
}

/* ============================================================
   EXPORT DES CODES (.txt)
   ============================================================ */
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function nowStr() {
  var d = new Date();
  return pad2(d.getDate()) + '/' + pad2(d.getMonth() + 1) + '/' + d.getFullYear() +
         ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}
function nowFileSafe() {
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) +
         '_' + pad2(d.getHours()) + pad2(d.getMinutes());
}

function buildCodesText() {
  var base = location.origin + location.pathname;
  var line = '═══════════════════════════════════════════════';
  var lines = [];
  lines.push(line);

  if (state.dayDate)  lines.push('  Date : ' + state.dayDate);
  lines.push('  Exporté le : ' + nowStr());
  lines.push(line);
  lines.push('');
  lines.push('🔴 CODE ADMIN (À GARDER SECRET) :');
  lines.push('   ' + state.adminCode);
  lines.push('');
  lines.push('🟢 LIEN À PARTAGER (un seul lien pour TOUT LE MONDE) :');
  lines.push('   ' + base + '?c=' + state.clubId);
  lines.push('');
  lines.push('   👁 Tout le monde arrive en SPECTATEUR par défaut.');
  lines.push('   🔑 Bouton « J\'ai un code » dans l\'app pour passer en :');
  lines.push('      - Fore Caddy (4 lettres) : modifie SA rencontre');
  lines.push('      - Admin (4 lettres + 2 chiffres) : tout gérer');
  lines.push('');

  var icsArr = Object.keys(state.ics).map(function(id) {
    return Object.assign({ id: id }, state.ics[id]);
  }).sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });

  if (icsArr.length > 0) {
    lines.push(line);
    lines.push('  RENCONTRES (' + icsArr.length + ')');
    lines.push(line);
    lines.push('');
    icsArr.forEach(function(ic) {
      lines.push('▸ ' + ic.name);
      lines.push('  Nb de matchs : ' + (ic.nbMatches || '?'));
      lines.push('  Code Fore Caddy : ' + (ic.fcCode || '—'));
      lines.push('');
    });
  } else {
    lines.push('(Aucune rencontre créée pour le moment)');
    lines.push('');
  }

  lines.push(line);
  lines.push('💡 EN PRATIQUE :');
  lines.push('  1. Envoie le lien ci-dessus à TOUT LE MONDE par WhatsApp');
  lines.push('  2. Donne en privé son code à chaque Fore Caddy');
  lines.push('  3. Garde le code admin secret');
  lines.push('  4. Les FC tapent leur code dans l\'app pour activer leurs droits');
  lines.push('');
  lines.push('⚠️  Garde ce fichier précieusement.');
  lines.push(line);

  return lines.join('\n');
}

function downloadCodes() {
  var txt = buildCodesText();
  var blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var safeClub = (state.clubName || 'Club').replace(/[^a-zA-Z0-9_-]/g, '_');
  a.href = url;
  a.download = safeClub + '_codes_' + nowFileSafe() + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  showToast('💾 Fichier codes téléchargé');
}

/* ============================================================
   ROUTING / DÉMARRAGE
   ============================================================ */
function start() {
  var p = new URLSearchParams(location.search);
  var clubId = p.get('c');
  var adm    = p.get('a');
  var fc     = p.get('fc');

  if (!clubId) {
    // Aucun club : essayer le dernier connu, sinon écran de bienvenue (création)
    var lastClub = null, lastAdm = null;
    try {
      lastClub = localStorage.getItem('lastClub');
      lastAdm  = localStorage.getItem('lastAdm');
    } catch(e) {}
    if (lastClub) {
      // Reprendre la dernière session
      enterClub(lastClub, lastAdm, null);
    } else {
      renderWelcome();
    }
  } else {
    enterClub(clubId, adm, fc);
  }
  showInstallBanner();
}

function enterClub(clubId, adm, fc) {
  state.clubId = clubId;
  state.clubRef = db.ref('golfClubs/' + clubId);

  // Si pas de code FC dans l'URL, voir si on en avait un mémorisé localement
  if (!fc && !adm) {
    try { fc = localStorage.getItem('lastFc_' + clubId); } catch(e) {}
  }
  // Si pas de code admin dans l'URL, voir si on en avait un mémorisé localement
  if (!adm) {
    try {
      var lastClubId = localStorage.getItem('lastClub');
      var lastAdm = localStorage.getItem('lastAdm');
      if (lastClubId === clubId && lastAdm) adm = lastAdm;
    } catch(e) {}
  }

  state.clubRef.once('value').then(function(snap) {
    if (!snap.exists()) {
      alert('Club introuvable. Vérifie le lien.');
      renderWelcome();
      return;
    }
    var club = snap.val();
    state.clubName = club.name || 'Golf Club';
    state.dayDate = club.dayDate || null;
    state.dayTitle = club.dayTitle || null;

    // Déterminer le rôle
    if (adm && club.adminCode && adm.toUpperCase() === club.adminCode.toUpperCase()) {
      state.role = 'admin';
      state.adminCode = club.adminCode;
      try {
        localStorage.setItem('lastClub', clubId);
        localStorage.setItem('lastAdm', club.adminCode);
      } catch(e) {}
    } else if (fc) {
      var foundIc = null;
      var icsObj = club.ics || {};
      for (var icId in icsObj) {
        if (icsObj[icId].fcCode && icsObj[icId].fcCode.toUpperCase() === fc.toUpperCase()) {
          foundIc = icId;
          break;
        }
      }
      if (foundIc) {
        state.role = 'fc';
        state.fcCode = fc.toUpperCase();
        state.currentIcId = foundIc;
        try {
          localStorage.setItem('lastClub', clubId);
          localStorage.setItem('lastFc_' + clubId, state.fcCode);
        } catch(e) {}
      } else {
        // Code FC invalide ou expiré → spectateur
        state.role = 'spec';
        try { localStorage.removeItem('lastFc_' + clubId); } catch(e) {}
      }
    } else {
      state.role = 'spec';
      try { localStorage.setItem('lastClub', clubId); } catch(e) {}
    }

    // URL "propre" : on ne garde que le code club (le FC/admin reste en localStorage)
    history.replaceState(null, '', '?c=' + clubId);

    subscribeIcs();
  }).catch(function(e) {
    alert('Erreur : ' + e.message);
    renderWelcome();
  });
}

function subscribeIcs() {
  state.clubRef.on('value', function(snap) {
    if (!snap.exists()) {
      alert('Le club a été supprimé.');
      leaveClub();
      return;
    }
    var club = snap.val();
    state.clubName = club.name || 'Golf Club';
    state.dayDate = club.dayDate || null;
    state.dayTitle = club.dayTitle || null;
    state.ics = club.ics || {};
    if (state.role === 'admin') state.adminCode = club.adminCode;
    if (state.role === 'fc' && state.currentIcId && !state.ics[state.currentIcId]) {
      // Le FC n'avait plus son IC : repasse en spectateur
      state.role = 'spec';
      state.currentIcId = null;
      state.fcCode = null;
      try { localStorage.removeItem('lastFc_' + state.clubId); } catch(e) {}
      showToast('Ta rencontre a été effacée — passage en spectateur');
    }
    render();
  });
}

function leaveClub() {
  if (state.clubRef) state.clubRef.off();
  state = {
    clubId: null, clubName: null, dayDate: null, dayTitle: null,
    adminCode: null, fcCode: null, role: 'none',
    ics: {}, currentIcId: null, fcViewingIc: null, clubRef: null
  };
  try {
    localStorage.removeItem('lastClub');
    localStorage.removeItem('lastAdm');
  } catch(e) {}
  history.replaceState(null, '', location.pathname);
  renderWelcome();
}

/* Applique un code (entré par l'utilisateur) au club courant.
   Si OK : on bascule en FC ou admin. Sinon on reste en spectateur. */
function applyCode(rawCode) {
  if (!state.clubId) return;
  var code = (rawCode || '').trim().toUpperCase();
  if (!code) { showToast('Entre un code'); return; }

  state.clubRef.once('value').then(function(snap) {
    if (!snap.exists()) { showToast('Club introuvable'); return; }
    var club = snap.val();

    // Code admin ?
    if (club.adminCode && code === club.adminCode.toUpperCase()) {
      state.role = 'admin';
      state.adminCode = club.adminCode;
      state.fcCode = null;
      state.currentIcId = null;
      try {
        localStorage.setItem('lastClub', state.clubId);
        localStorage.setItem('lastAdm', club.adminCode);
        localStorage.removeItem('lastFc_' + state.clubId);
      } catch(e) {}
      showToast('🔴 Mode admin activé');
      render();
      return;
    }

    // Code FC ?
    var foundIc = null;
    var icsObj = club.ics || {};
    for (var icId in icsObj) {
      if (icsObj[icId].fcCode && icsObj[icId].fcCode.toUpperCase() === code) {
        foundIc = icId;
        break;
      }
    }
    if (foundIc) {
      state.role = 'fc';
      state.fcCode = code;
      state.currentIcId = foundIc;
      state.adminCode = null;
      try {
        localStorage.setItem('lastClub', state.clubId);
        localStorage.setItem('lastFc_' + state.clubId, code);
        localStorage.removeItem('lastAdm');
      } catch(e) {}
      showToast('⛳ Mode Fore Caddy : ' + (icsObj[foundIc].name || ''));
      render();
      return;
    }

    // Code invalide
    showToast('❌ Code incorrect — tu restes en spectateur');
  });
}

function backToSpectator() {
  state.role = 'spec';
  state.adminCode = null;
  state.fcCode = null;
  state.currentIcId = null;
  state.fcViewingIc = null;
  try {
    localStorage.removeItem('lastAdm');
    localStorage.removeItem('lastFc_' + state.clubId);
  } catch(e) {}
  showToast('👁 Mode spectateur');
  render();
}

/* ============================================================
   RENDER ROUTER
   ============================================================ */
function render() {
  // Si admin et qu'on était en train de voir un IC en détail, on y reste
  if (state.role === 'admin' && adminViewingIc) {
    if (state.ics[adminViewingIc]) {
      renderIcDetail(adminViewingIc, true);
      return;
    } else {
      // L'IC a été supprimé : retour à la liste
      adminViewingIc = null;
    }
  }
  if (state.role === 'admin') renderAdmin();
  else if (state.role === 'fc') renderFc();
  else renderSpectator();
}

/* ============================================================
   VUE FORE CADDY : voit TOUS les IC, modifie SEULEMENT le sien
   Navigation par flèches/dots comme le spectateur
   ============================================================ */
function renderFc() {
  if (!state.currentIcId || !state.ics[state.currentIcId]) {
    appEl.innerHTML = '<div class="card"><div class="empty">Rencontre introuvable</div></div>';
    return;
  }

  // Mémoriser scroll/focus
  var savedScroll = window.scrollY;
  var savedFocusPid = null, savedCaret = 0;
  var activeEl = document.activeElement;
  if (activeEl && activeEl.classList && activeEl.classList.contains('player-name') && activeEl.dataset.pid) {
    savedFocusPid = activeEl.dataset.pid;
    try { savedCaret = activeEl.selectionStart; } catch(e) {}
  }

  // Le FC peut naviguer entre tous les IC (en lecture seule pour les autres)
  var icsArr = Object.keys(state.ics).map(function(id) {
    return Object.assign({ id: id }, state.ics[id]);
  }).sort(function(a, b) {
    return (a.createdAt || 0) - (b.createdAt || 0);
  });

  // Trouver la position de l'IC affiché actuellement
  var viewingIcId = state.fcViewingIc || state.currentIcId;
  var idx = 0;
  for (var i = 0; i < icsArr.length; i++) {
    if (icsArr[i].id === viewingIcId) { idx = i; break; }
  }
  if (!icsArr[idx]) {
    viewingIcId = state.currentIcId;
    idx = 0;
    for (var j = 0; j < icsArr.length; j++) {
      if (icsArr[j].id === viewingIcId) { idx = j; break; }
    }
  }
  var ic = icsArr[idx] || state.ics[state.currentIcId];
  if (!ic) return;

  // Suis-je sur MON IC ? (= ai-je le droit de modifier ?)
  var isMyIc = (ic.id === state.currentIcId) ||
               (state.fcViewingIc && state.fcViewingIc === state.currentIcId) ||
               (!state.fcViewingIc);
  // Plus simple : c'est mon IC si l'ID affiché == celui pour lequel j'ai le code
  isMyIc = (ic.id === state.currentIcId);

  var sc = computeIcScore(ic);

  // ----- Liste joueurs -----
  var pids = Object.keys(ic.players || {}).sort(function(a, b) {
    return ((ic.players[a] && ic.players[a].order) || 0) - ((ic.players[b] && ic.players[b].order) || 0);
  });

  var playersHtml;
  if (pids.length === 0) {
    playersHtml = '<div class="empty">' +
                    (isMyIc ? 'L\'admin doit ajouter des joueurs' : 'Pas de joueurs') +
                  '</div>';
  } else {
    playersHtml = pids.map(function(pid) {
      var p = ic.players[pid];
      var f = formatScore(p.score || 0);
      var won = !!p.won;
      var safeName = escapeHtml(p.name || '');

      if (isMyIc) {
        // Mon IC : boutons +/- et 🏆 actifs (pas de suppression : admin only)
        var trophyBtn = '<button class="btn btn-trophy ' + (won ? 'on' : '') + '" data-act="trophy" data-pid="' + pid + '" title="Match gagné">🏆</button>';
        return '' +
          '<div class="player ' + (won ? 'won' : '') + '">' +
            '<div class="row">' +
              '<div class="player-name">' + safeName + '</div>' +
              trophyBtn +
            '</div>' +
            '<div class="row">' +
              '<div class="group">' +
                '<span class="label">Trou</span>' +
                '<button class="btn btn-hole" data-act="hole" data-pid="' + pid + '" data-d="-1">−</button>' +

function renderIcDetail(icId, isAdminView) {

  // Mémoriser la position de scroll et le focus avant le re-render
  var savedScroll = window.scrollY;
  var savedFocusPid = null, savedCaret = 0;
  var activeEl = document.activeElement;
  if (activeEl && activeEl.classList && activeEl.classList.contains('player-name') && activeEl.dataset.pid) {
    savedFocusPid = activeEl.dataset.pid;
    try { savedCaret = activeEl.selectionStart; } catch(e) {}
  }
  var newPlayerInputHadFocus = activeEl && activeEl.id === 'newPlayerName';
  var newPlayerValue = newPlayerInputHadFocus ? activeEl.value : '';

  var playersHtml = '';
  var pids = Object.keys(ic.players || {}).sort(function(a, b) {
    return ((ic.players[a] && ic.players[a].order) || 0) - ((ic.players[b] && ic.players[b].order) || 0);

            '</div>' +

    ? '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">' +
        '<button class="btn-secondary" id="btnReset" style="flex:1;min-width:130px">🔄 Reset scores</button>' +

function openCodePrompt() {
  showModal(
    '<h3>🔑 Entre ton code</h3>' +
    '<div style="font-size:13px;color:#64748b;margin-bottom:10px">' +
      '4 lettres = Fore Caddy<br>' +
      '4 lettres + 2 chiffres = Admin<br>' +
      'Mauvais code = tu restes en spectateur' +
    '</div>' +
    '<input class="field code-field" id="m-code" placeholder="ABCD" maxlength="6" autocomplete="off" autocorrect="off" autocapitalize="characters">' +
    '<div class="modal-actions">' +
      '<button class="ma-cancel" onclick="hideModal()">Annuler</button>' +
      '<button class="ma-primary" id="m-ok">Valider</button>' +
    '</div>'
  );
  var input = document.getElementById('m-code');
  setTimeout(function() { input.focus(); }, 100);
  input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('m-ok').click();
  });
  document.getElementById('m-ok').onclick = function() {
    var c = input.value.trim();
    if (!c) return;
    hideModal();
    applyCode(c);
  };
}

/* ============================================================
   ACTIONS sur Firebase
   ============================================================ */
function addPlayer(icId) {
  var input = document.getElementById('newPlayerName');
  var name = input.value.trim();
  if (!name) return;
  var ic = state.ics[icId];
  var maxOrder = 0;
  if (ic.players) for (var k in ic.players) if (ic.players[k].order > maxOrder) maxOrder = ic.players[k].order;
  var newRef = state.clubRef.child('ics/' + icId + '/players').push();
  newRef.set({ name: name, score: 0, hole: 0, won: false, order: maxOrder + 1 });
  input.value = '';
}
function removePlayer(icId, pid) {
  var name = (state.ics[icId].players[pid] && state.ics[icId].players[pid].name) || '?';
  if (!confirm('Supprimer ' + name + ' ?')) return;
  state.clubRef.child('ics/' + icId + '/players/' + pid).remove();
}
function renamePlayer(icId, pid, name) {
  var v = name.trim();
  if (!v) return;
  state.clubRef.child('ics/' + icId + '/players/' + pid).update({ name: v });
}
function changeScore(icId, pid, d) {
  var p = state.ics[icId].players[pid];
  var cur = (p && p.score) || 0;
  state.clubRef.child('ics/' + icId + '/players/' + pid).update({ score: cur + d });
}
function changeHole(icId, pid, d) {
  var p = state.ics[icId].players[pid];
  var h = ((p && p.hole) || 0) + d;
  if (h < 0) h = 0;
  if (h > 18) h = 18;
  state.clubRef.child('ics/' + icId + '/players/' + pid).update({ hole: h });
}
function toggleWon(icId, pid) {
  var p = state.ics[icId].players[pid];
  var newWon = !p.won;
  state.clubRef.child('ics/' + icId + '/players/' + pid).update({ won: newWon });
}
function resetIc(icId) {
  if (!confirm('Reset scores de cet IC ?\n(les joueurs sont gardés, scores remis à 0)')) return;
  var p = state.ics[icId].players || {};
  var updates = {};
  for (var pid in p) {
    updates[pid + '/score'] = 0;
    updates[pid + '/hole']  = 0;
    updates[pid + '/won']   = false;
  }
  state.clubRef.child('ics/' + icId + '/players').update(updates);
}
function resetPlayers(icId) {
  if (!confirm('Supprimer TOUS les joueurs de cet IC ?\n\nLa rencontre est gardée, mais tu devras ré-ajouter les joueurs.')) return;
  state.clubRef.child('ics/' + icId + '/players').remove();
}
function deleteIc(icId) {
  var name = state.ics[icId].name || '?';
  if (!confirm('Supprimer définitivement « ' + name + ' » ?')) return;
  state.clubRef.child('ics/' + icId).remove();
}

/* ============================================================
   MODALS : créer/modifier IC, partage, etc.
   ============================================================ */
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-bg').classList.add('show');
}
function hideModal() {
  document.getElementById('modal-bg').classList.remove('show');
}
document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modal-bg')) hideModal();
});

function openEditDayModal() {
  var today = new Date();
  var defaultDate = today.getFullYear() + '-' +
                    pad2(today.getMonth() + 1) + '-' + pad2(today.getDate());
  var defaultTitle = 'Journée du ' + pad2(today.getDate()) + '/' + pad2(today.getMonth() + 1);
  showModal(
    '<h3>📅 Journée IC</h3>' +
    '<div class="lbl">Titre de la journée (libre)</div>' +
    '<input class="field" id="m-dtitle" placeholder="Ex : Journée du 27 avril" value="' + escapeHtml(state.dayTitle || defaultTitle) + '" maxlength="50">' +
    '<div class="lbl">Date</div>' +
    '<input class="field" id="m-ddate" type="date" value="' + (state.dayDate || defaultDate) + '">' +
    '<div class="modal-actions">' +
      '<button class="ma-cancel" onclick="hideModal()">Annuler</button>' +
      '<button class="ma-success" id="m-ok">Enregistrer</button>' +
    '</div>'
  );
  document.getElementById('m-ok').onclick = function() {
    var title = document.getElementById('m-dtitle').value.trim();
    var date = document.getElementById('m-ddate').value;
    if (!title) { alert('Donne un titre à la journée'); return; }
    state.clubRef.update({
      dayTitle: title,
      dayDate: date || null
    }).then(function() {
      hideModal();
      showToast('📅 Journée enregistrée');
    });
  };
}

function startNewDay() {
  if (!confirm('🔄 Démarrer une NOUVELLE journée IC ?\n\nToutes les rencontres actuelles, joueurs et scores seront EFFACÉS.\nLe code admin et le club seront conservés.\n\nContinuer ?')) return;
  if (!confirm('⚠️ Confirme une seconde fois : tout sera effacé.\n\nAs-tu bien sauvegardé les codes (.txt) si besoin ?')) return;
  // Effacer toutes les rencontres + reset journée
  state.clubRef.update({
    ics: null,
    dayDate: null,
    dayTitle: null
  }).then(function() {
    showToast('🔄 Nouvelle journée démarrée');
    setTimeout(function() { openEditDayModal(); }, 500);
  });
}

function openNewIcModal() {
  var defaultFc = genCode4();
  showModal(
    '<h3>+ Nouvelle rencontre</h3>' +
    '<div class="lbl">Nom de la rencontre</div>' +
    '<input class="field" id="m-icname" placeholder="Ex : Men 4 vs Hasselt" maxlength="40">' +
    '<div class="lbl">Nombre de matchs (5 à 7)</div>' +
    '<input class="field" id="m-nbm" type="number" min="5" max="7" value="5">' +
    '<div class="lbl">Code Fore Caddy (4 lettres, modifiable)</div>' +
    '<input class="field code-field" id="m-fc" value="' + defaultFc + '" maxlength="4">' +
    '<div style="text-align:center;margin-top:6px"><button class="small-link" style="color:#2563eb" id="m-regen">🎲 Générer un nouveau code</button></div>' +
    '<div class="modal-actions">' +
      '<button class="ma-cancel" onclick="hideModal()">Annuler</button>' +
      '<button class="ma-success" id="m-ok">Créer</button>' +
    '</div>'
  );
  document.getElementById('m-regen').onclick = function() {
    document.getElementById('m-fc').value = genCode4();
  };
  document.getElementById('m-ok').onclick = function() {
    var n = document.getElementById('m-icname').value.trim();
    var nbm = parseInt(document.getElementById('m-nbm').value);
    var fc = document.getElementById('m-fc').value.trim().toUpperCase();
    if (!n) { alert('Donne un nom à la rencontre'); return; }
    if (nbm < 5 || nbm > 7) { alert('Nombre de matchs entre 5 et 7'); return; }
    if (fc.length !== 4) { alert('Le code FC doit faire 4 caractères'); return; }
    // Vérifier qu'aucune autre rencontre n'a déjà ce code
    for (var existingId in state.ics) {
      if (state.ics[existingId].fcCode && state.ics[existingId].fcCode.toUpperCase() === fc) {
        alert('Ce code FC est déjà utilisé par "' + state.ics[existingId].name + '". Choisis-en un autre.');
        return;
      }
    }
    var icId = genIcId();
    state.clubRef.child('ics/' + icId).set({
      name: n,
      nbMatches: nbm,
      fcCode: fc,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      players: {}
    }).then(function() {
      hideModal();
      showToast('Rencontre créée : ' + n);
      setTimeout(function() {
        if (confirm('Rencontre créée ! ⛳\n\nCode Fore Caddy : ' + fc + '\n\nTu veux télécharger le fichier mis à jour avec tous les codes ?')) {
          downloadCodes();
        }
      }, 600);
    }).catch(function(e) { alert('Erreur : ' + e.message); });
  };
}

function changeAdminCode() {

  state.clubRef.update({ adminCode: newCode }).then(function() {

function renameClub() {

  state.clubRef.update({ name: name.trim() });
}

/* ============================================================
   UTILS UI
   ============================================================ */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function copyText(txt, msg) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(
      function() { showToast(msg); },
      function() { prompt('Copie ce lien :', txt); }
    );
  } else { prompt('Copie ce lien :', txt); }
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

/* ============================================================
   BANNIÈRE iOS
   ============================================================ */
function isIOS()        { return /iPhone|iPad|iPod/i.test(navigator.userAgent) && !window.MSStream; }
function isStandalone() { return window.navigator.standalone === true ||
                                 window.matchMedia('(display-mode: standalone)').matches; }
function dismissBanner() {
  document.getElementById('install-banner').classList.remove('show');
  try { localStorage.setItem('installBannerDismissed', Date.now()); } catch(e) {}
}
function showInstallBanner() {
  if (!isIOS() || isStandalone()) return;
  var dismissed = 0;
  try { dismissed = parseInt(localStorage.getItem('installBannerDismissed') || '0'); } catch(e) {}
  if (dismissed && (Date.now() - dismissed) < 7 * 24 * 3600 * 1000) return;
  setTimeout(function() { document.getElementById('install-banner').classList.add('show'); }, 1500);
}
