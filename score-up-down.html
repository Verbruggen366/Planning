<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    color: #fff;
  }
  .container { max-width: 500px; margin: 0 auto; }
  h1 { text-align: center; font-size: 1.6rem; margin-bottom: 16px; font-weight: 700; letter-spacing: 0.5px; }

  .session-bar {
    background: rgba(0,0,0,0.3); border-radius: 12px; padding: 10px 12px;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px; font-size: 14px; flex-wrap: wrap;
  }
  .session-code {
    font-family: 'Courier New', monospace; font-size: 22px; font-weight: 800;
    letter-spacing: 4px; color: #ffd54f; flex: 1; text-align: center; min-width: 0;
  }
  .session-bar button {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    padding: 6px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .session-bar button:active { background: rgba(255,255,255,0.35); }
  .role-badge {
    font-size: 10px; font-weight: 800; padding: 3px 8px;
    border-radius: 10px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .role-admin { background: #dc2626; color: #fff; }
  .role-view  { background: #475569; color: #fff; }

  .status { text-align: center; font-size: 12px; margin-bottom: 12px; opacity: 0.8; }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; background: #4ade80; }

  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-row input {
    flex: 1; padding: 14px 16px; border: none; border-radius: 12px;
    font-size: 16px; background: rgba(255,255,255,0.95); color: #222;
  }
  .add-row input:focus { outline: 2px solid #ffd54f; }
  .add-row button {
    padding: 14px 20px; border: none; border-radius: 12px;
    background: #ffd54f; color: #1e3c72; font-weight: 700; font-size: 16px; cursor: pointer;
  }

  .player {
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    border-radius: 16px; padding: 12px; margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .row + .row { margin-top: 10px; }
  .player-name {
    flex: 1; background: transparent; border: none; color: #fff;
    font-size: 17px; font-weight: 700; padding: 6px 4px; min-width: 0;
  }
  .player-name:focus { outline: none; background: rgba(255,255,255,0.1); border-radius: 6px; }
  .player-name[readonly] { pointer-events: none; }

  .group {
    display: flex; align-items: center; gap: 6px; flex: 1;
    background: rgba(0,0,0,0.2); border-radius: 12px; padding: 4px;
  }
  .label {
    font-size: 11px; text-transform: uppercase; opacity: 0.8; font-weight: 700;
    letter-spacing: 0.5px; padding-left: 6px; flex-shrink: 0;
  }
  .display { flex: 1; text-align: center; font-size: 16px; font-weight: 800;
             padding: 6px 4px; letter-spacing: 0.3px; }
  .hole-display { color: #fff; }
  .score-up { color: #4ade80; }
  .score-down { color: #f87171; }
  .score-as { color: #fbbf24; }

  .btn {
    width: 38px; height: 38px; border: none; border-radius: 50%;
    font-size: 22px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0;
  }
  .btn-up { background: #16a34a; }
  .btn-up:active { background: #15803d; transform: scale(0.92); }
  .btn-down { background: #dc2626; }
  .btn-down:active { background: #b91c1c; transform: scale(0.92); }
  .btn-hole { background: #475569; }
  .btn-hole:active { background: #334155; transform: scale(0.92); }
  .btn-del { background: rgba(255,255,255,0.15); width: 30px; height: 30px; font-size: 14px; }
  .btn-del:active { background: rgba(255,255,255,0.3); }

  .footer { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .footer button {
    flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 12px;
    background: rgba(255,255,255,0.15); color: #fff; font-weight: 600;
    font-size: 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.25);
  }
  .footer button:active { background: rgba(255,255,255,0.25); }

  .empty { text-align: center; padding: 40px 20px; opacity: 0.7; font-style: italic; }

  /* Welcome */
  .welcome {
    background: rgba(255,255,255,0.15); border-radius: 16px; padding: 24px;
    margin-top: 30px; border: 1px solid rgba(255,255,255,0.2);
  }
  .welcome h2 { font-size: 18px; margin-bottom: 14px; text-align: center; }
  .welcome button.primary {
    width: 100%; padding: 16px; background: #ffd54f; color: #1e3c72;
    border: none; border-radius: 12px; font-size: 17px; font-weight: 700;
    cursor: pointer; margin-bottom: 14px;
  }
  .welcome .hint { font-size: 11px; opacity: 0.75; text-align: center; margin-top: 8px; line-height: 1.4; }
  .divider { text-align: center; margin: 14px 0; opacity: 0.6; font-size: 13px; }
  .join-row { display: flex; gap: 8px; }
  .join-row input {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-size: 18px; font-weight: 700; text-align: center; letter-spacing: 4px;
    text-transform: uppercase; font-family: 'Courier New', monospace;
    background: rgba(255,255,255,0.95); color: #1e3c72;
  }
  .join-row button {
    padding: 14px 18px; background: #16a34a; color: #fff;
    border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 15px;
  }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 9998; display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; color: #1e293b; border-radius: 16px;
    padding: 22px; max-width: 380px; width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 14px; color: #1e3c72; }
  .modal .code-box {
    background: #f1f5f9; border-radius: 10px; padding: 12px;
    margin: 10px 0; font-family: 'Courier New', monospace;
    font-size: 14px; font-weight: 800; word-break: break-all;
    text-align: center; letter-spacing: 1px; color: #1e3c72;
    border: 2px dashed #cbd5e1;
  }
  .modal .lbl { font-size: 12px; font-weight: 700; color: #64748b;
                text-transform: uppercase; letter-spacing: 0.5px; margin-top: 14px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button {
    flex: 1; padding: 11px; border: none; border-radius: 10px;
    font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .modal-actions .copy-spec { background: #475569; color: #fff; }
  .modal-actions .copy-adm  { background: #dc2626; color: #fff; }
  .modal-actions .close     { background: #f1f5f9; color: #64748b; }

  /* ─── BANNIÈRE iOS / BROWSER NON-SAFARI ──────────────────── */
  .install-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; color: #1e3c72;
    padding: 16px 18px calc(16px + env(safe-area-inset-bottom)) 18px;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
    z-index: 9999; transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(.16,1,.3,1);
    border-radius: 18px 18px 0 0;
  }
  .install-bar.show { transform: translateY(0); }
  .ib-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .ib-icon {
    width: 52px; height: 52px; border-radius: 12px;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; flex-shrink: 0; box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  }
  .ib-text { flex: 1; }
  .ib-title { font-size: 16px; font-weight: 800; line-height: 1.2; }
  .ib-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
  .ib-close {
    background: #f1f5f9; border: none; width: 30px; height: 30px;
    border-radius: 50%; font-size: 16px; color: #64748b;
    cursor: pointer; flex-shrink: 0;
  }
  .ib-steps {
    background: #f8fafc; border-radius: 12px; padding: 12px 14px;
    font-size: 13px; line-height: 1.6;
  }
  .ib-step { display: flex; align-items: center; gap: 8px; }
  .ib-step + .ib-step { margin-top: 4px; }
  .ib-num {
    width: 22px; height: 22px; border-radius: 50%; background: #1e3c72;
    color: #fff; font-weight: 800; font-size: 12px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .ib-share-icon {
    display: inline-block; width: 18px; height: 22px;
    background: #2563eb; color: #fff; border-radius: 4px;
    text-align: center; font-size: 13px; line-height: 22px;
    vertical-align: middle; margin: 0 2px;
  }
  .ib-arrow {
    display: inline-block; transform: translateY(4px);
    color: #2563eb; font-size: 22px; animation: bounce 1.2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(4px); }
    50%      { transform: translateY(10px); }
  }

  /* ─── BANNIÈRE ANDROID (1 BOUTON) ───────────────────────── */
  .ib-install-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #fff; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 12px rgba(30, 60, 114, 0.4);
    margin-top: 4px;
  }
  .ib-install-btn:active { transform: scale(0.97); }

  /* ─── BANNIÈRE EDGE/CHROME SUR iOS ─────────────────────── */
  .ib-warn {
    background: #fef3c7; color: #92400e; padding: 10px 12px;
    border-radius: 10px; font-size: 12px; line-height: 1.5;
    margin-bottom: 10px; border: 1px solid #fcd34d;
  }
  .ib-copy-btn {
    background: #1e3c72; color: #fff; border: none;
    padding: 6px 12px; border-radius: 8px; font-size: 12px;
    font-weight: 700; cursor: pointer; margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>⛳ Score Up / Down</h1>
  <div id="app"></div>
</div>

<!-- MODAL PARTAGE ADMIN -->
<div class="modal-bg" id="shareModal">
  <div class="modal">
    <h3>📤 Partager la session</h3>

    <div class="lbl">🟢 Lien spectateur — pour les joueurs</div>
    <div style="font-size:12px;color:#64748b;margin:4px 0 6px">Ils peuvent voir et modifier les scores/trous.</div>
    <div class="code-box" id="modalSpecLink"></div>

    <div class="lbl">🔴 Lien admin — pour toi (et co-admin)</div>
    <div style="font-size:12px;color:#64748b;margin:4px 0 6px">Peut ajouter/supprimer des joueurs et faire un reset.</div>
    <div class="code-box" style="background:#fef2f2;border-color:#fca5a5;color:#dc2626" id="modalAdmLink"></div>

    <div class="modal-actions">
      <button class="copy-spec" onclick="copyText(currentSpecUrl, 'Lien spectateur copié !')">📋 Copier spectateur</button>
      <button class="copy-adm"  onclick="copyText(currentAdmUrl,  'Lien admin copié !')">📋 Copier admin</button>
    </div>
    <div class="modal-actions" style="margin-top:8px">
      <button class="close" onclick="closeShareModal()">Fermer</button>
    </div>
  </div>
</div>

<!-- BANNIÈRE INSTALL — contenu généré dynamiquement -->
<div id="install-bar" class="install-bar"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<script>
  // ============================================================
  //  Firebase
  // ============================================================
  var firebaseConfig = {
    apiKey: "AIzaSyAuXW6oBiNPw4W4lZoLPqjpVlLLwA6rt5Q",
    authDomain: "verbruggen-planning.firebaseapp.com",
    databaseURL: "https://verbruggen-planning-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "verbruggen-planning",
    storageBucket: "verbruggen-planning.firebasestorage.app",
    messagingSenderId: "506403938885",
    appId: "1:506403938885:web:2dccdff0b8457036c4392c"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  // ============================================================
  //  ÉTAT
  // ============================================================
  var sessionCode = null, adminSecret = null, isAdmin = false;
  var sessionRef = null, players = {};
  var focusedInputId = null, caretPos = 0;
  var currentSpecUrl = '', currentAdmUrl = '';
  var appEl = document.getElementById('app');
  var deferredInstallPrompt = null; // pour Android

  // ============================================================
  //  DÉTECTION OS / BROWSER
  // ============================================================
  function ua() { return navigator.userAgent || ''; }
  function isIOS()        { return /iPad|iPhone|iPod/i.test(ua()) && !window.MSStream; }
  function isAndroid()    { return /Android/i.test(ua()); }
  function isStandalone() {
    return window.navigator.standalone === true ||
           window.matchMedia('(display-mode: standalone)').matches;
  }
  // Sur iOS, savoir si on est dans Safari ou un autre navigateur (Edge/Chrome/Firefox)
  function isIOSSafari() {
    if (!isIOS()) return false;
    var u = ua();
    // Safari iOS contient "Safari" mais PAS "CriOS" (Chrome), "FxiOS" (Firefox), "EdgiOS" (Edge)
    return /Safari/i.test(u) && !/CriOS|FxiOS|EdgiOS|OPiOS|YaBrowser/i.test(u);
  }

  // ============================================================
  //  BANNIÈRE INSTALLATION (multi-OS)
  // ============================================================
  function dismissBanner() {
    document.getElementById('install-bar').classList.remove('show');
    try { localStorage.setItem('installBannerDismissed', Date.now()); } catch(e) {}
  }

  function showInstallBanner() {
    if (isStandalone()) return;  // déjà installée, on ne fait rien

    // Si l'utilisateur a fermé la bannière dans les 7 derniers jours, on respecte
    var dismissed = 0;
    try { dismissed = parseInt(localStorage.getItem('installBannerDismissed') || '0'); } catch(e) {}
    if (dismissed && (Date.now() - dismissed) < 7 * 24 * 3600 * 1000) return;

    var html = '';

    if (isAndroid()) {
      // ─── ANDROID : bouton d'installation natif ───
      // Le bouton sera fonctionnel si l'événement beforeinstallprompt est dispo.
      // Sinon (Firefox Android par ex.), on affiche les instructions manuelles.
      html =
        '<div class="ib-head">' +
          '<div class="ib-icon">⛳</div>' +
          '<div class="ib-text">' +
            '<div class="ib-title">Installer Score Golf</div>' +
            '<div class="ib-sub">Ajoute l\'app à ton écran d\'accueil</div>' +
          '</div>' +
          '<button class="ib-close" onclick="dismissBanner()">✕</button>' +
        '</div>' +
        '<button class="ib-install-btn" id="androidInstallBtn">📲 Installer maintenant</button>' +
        '<div id="androidFallback" style="display:none;margin-top:10px">' +
          '<div class="ib-steps">' +
            '<div class="ib-step"><div class="ib-num">1</div><div>Tape sur le menu <b>⋮</b> en haut à droite</div></div>' +
            '<div class="ib-step"><div class="ib-num">2</div><div>Choisis <b>« Ajouter à l\'écran d\'accueil »</b></div></div>' +
          '</div>' +
        '</div>';

    } else if (isIOSSafari()) {
      // ─── iOS Safari : instructions classiques ───
      html =
        '<div class="ib-head">' +
          '<div class="ib-icon">⛳</div>' +
          '<div class="ib-text">' +
            '<div class="ib-title">Installer Score Golf</div>' +
            '<div class="ib-sub">Ajoute l\'app à ton écran d\'accueil</div>' +
          '</div>' +
          '<button class="ib-close" onclick="dismissBanner()">✕</button>' +
        '</div>' +
        '<div class="ib-steps">' +
          '<div class="ib-step"><div class="ib-num">1</div><div>Tape sur <span class="ib-share-icon">⬆</span> en bas de Safari</div></div>' +
          '<div class="ib-step"><div class="ib-num">2</div><div>Choisis <b>« Sur l\'écran d\'accueil »</b></div></div>' +
          '<div class="ib-step"><div class="ib-num">3</div><div>Tape <b>Ajouter</b> ✅</div></div>' +
        '</div>' +
        '<div style="text-align:center;margin-top:6px"><span class="ib-arrow">⬇</span></div>';

    } else if (isIOS()) {
      // ─── iOS dans Edge/Chrome/Firefox : on demande de passer à Safari ───
      html =
        '<div class="ib-head">' +
          '<div class="ib-icon">⛳</div>' +
          '<div class="ib-text">' +
            '<div class="ib-title">Installer Score Golf</div>' +
            '<div class="ib-sub">Sur iPhone, il faut Safari</div>' +
          '</div>' +
          '<button class="ib-close" onclick="dismissBanner()">✕</button>' +
        '</div>' +
        '<div class="ib-warn">⚠️ Pour installer l\'app sur iPhone, le lien doit être ouvert dans <b>Safari</b> (Apple bloque cette fonction dans Chrome, Edge, etc.).</div>' +
        '<div class="ib-steps">' +
          '<div class="ib-step"><div class="ib-num">1</div><div>Copie le lien de cette page :</div></div>' +
          '<div style="text-align:center"><button class="ib-copy-btn" onclick="copyCurrentUrl()">📋 Copier le lien</button></div>' +
          '<div class="ib-step" style="margin-top:8px"><div class="ib-num">2</div><div>Ouvre <b>Safari</b>, colle le lien dans la barre d\'adresse</div></div>' +
          '<div class="ib-step"><div class="ib-num">3</div><div>La bannière d\'installation apparaîtra automatiquement</div></div>' +
        '</div>';

    } else {
      // ─── Desktop ou OS inconnu : pas de bannière ───
      return;
    }

    var bar = document.getElementById('install-bar');
    bar.innerHTML = html;
    setTimeout(function() {
      bar.classList.add('show');
      // Si Android, brancher le bouton d'installation natif
      if (isAndroid()) {
        var btn = document.getElementById('androidInstallBtn');
        var fallback = document.getElementById('androidFallback');
        if (btn) {
          btn.onclick = function() {
            if (deferredInstallPrompt) {
              deferredInstallPrompt.prompt();
              deferredInstallPrompt.userChoice.then(function(choice) {
                deferredInstallPrompt = null;
                if (choice.outcome === 'accepted') {
                  dismissBanner();
                }
              });
            } else {
              // Pas de prompt natif dispo (Firefox Android, ou prompt déjà utilisé)
              btn.style.display = 'none';
              fallback.style.display = 'block';
            }
          };
        }
      }
    }, 1200);
  }

  function copyCurrentUrl() {
    copyText(location.href, 'Lien copié — colle-le dans Safari !');
  }

  // ============================================================
  //  Capter l'événement d'installation Android
  // ============================================================
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredInstallPrompt = e;
  });

  window.addEventListener('appinstalled', function() {
    deferredInstallPrompt = null;
    dismissBanner();
  });

  // ============================================================
  //  UTILS
  // ============================================================
  function generateSpecCode() {
    var chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    var c = '';
    for (var i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
    return c;
  }
  function generateAdminSecret() {
    var s = '';
    for (var i = 0; i < 2; i++) s += String(Math.floor(Math.random() * 10));
    return s;
  }
  function formatScore(s) {
    if (!s || s === 0) return { text: 'AS',           cls: 'score-as'   };
    if (s > 0)         return { text: s + ' UP',      cls: 'score-up'   };
    return               { text: Math.abs(s) + ' DN', cls: 'score-down' };
  }
  function buildSpecUrl(code)        { return location.origin + location.pathname + '?s=' + code; }
  function buildAdminUrl(code, secr) { return location.origin + location.pathname + '?s=' + code + '&a=' + secr; }

  // ============================================================
  //  WELCOME
  // ============================================================
  function renderWelcome() {
    appEl.innerHTML =
      '<div class="welcome">' +
        '<h2>Démarre une partie</h2>' +
        '<button class="primary" id="btnCreate">🆕 Créer une nouvelle partie</button>' +
        '<div class="hint">Tu seras admin et tu pourras partager 2 liens : un pour les joueurs, un pour toi (et co-admin).</div>' +
        '<div class="divider">— ou —</div>' +
        '<h2>Rejoindre une partie</h2>' +
        '<div class="join-row">' +
          '<input id="joinInput" type="text" maxlength="6" placeholder="CODE" ' +
                 'autocomplete="off" autocorrect="off" autocapitalize="characters">' +
          '<button id="btnJoin">Rejoindre</button>' +
        '</div>' +
        '<div class="hint">4 lettres = spectateur · 4 lettres + 2 chiffres = admin</div>' +
      '</div>';
    document.getElementById('btnCreate').onclick = createSession;
    document.getElementById('btnJoin').onclick = function() {
      var v = document.getElementById('joinInput').value.trim().toUpperCase();
      if (v.length !== 4 && v.length !== 6) {
        alert('Code invalide (4 lettres pour spectateur, ou 4 lettres + 2 chiffres pour admin)');
        return;
      }
      var spec = v.substring(0, 4);
      var sec  = v.length === 6 ? v.substring(4, 6) : null;
      joinSession(spec, sec);
    };
    document.getElementById('joinInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') document.getElementById('btnJoin').click();
    });
  }

  // ============================================================
  //  SESSIONS
  // ============================================================
  function createSession() {
    var spec = generateSpecCode();
    var sec  = generateAdminSecret();
    db.ref('golfSessions/' + spec).set({
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      adminSecret: sec,
      players: {}
    }).then(function() { enterSession(spec, sec); })
      .catch(function(e) { alert('Erreur : ' + e.message); });
  }

  function joinSession(spec, sec) {
    db.ref('golfSessions/' + spec).once('value').then(function(snap) {
      if (!snap.exists()) { alert('Session introuvable. Vérifie le code.'); return; }
      var val = snap.val();
      if (sec && val.adminSecret && sec !== val.adminSecret) {
        alert('Code admin incorrect. Tu seras connecté en spectateur.');
        sec = null;
      }
      enterSession(spec, sec);
    }).catch(function(e) { alert('Erreur : ' + e.message); });
  }

  function enterSession(spec, sec) {
    sessionCode = spec;
    adminSecret = sec || null;
    isAdmin     = !!sec;
    var url = isAdmin ? '?s=' + spec + '&a=' + sec : '?s=' + spec;
    history.replaceState(null, '', url);
    try {
      localStorage.setItem('lastGolfSession', spec);
      if (isAdmin) localStorage.setItem('lastGolfAdmin', sec);
      else         localStorage.removeItem('lastGolfAdmin');
    } catch(e) {}
    subscribe();
  }

  function leaveSession() {
    if (sessionRef) sessionRef.off();
    sessionRef = null; sessionCode = null; adminSecret = null;
    isAdmin = false; players = {};
    history.replaceState(null, '', location.pathname);
    try {
      localStorage.removeItem('lastGolfSession');
      localStorage.removeItem('lastGolfAdmin');
    } catch(e) {}
    renderWelcome();
  }

  function subscribe() {
    sessionRef = db.ref('golfSessions/' + sessionCode + '/players');
    sessionRef.on('value', function(snap) {
      players = snap.val() || {};
      renderGame();
    }, function(err) {
      console.error(err);
      alert('Erreur de synchronisation : ' + err.message);
    });
  }

  // ============================================================
  //  RENDU JEU
  // ============================================================
  function renderGame() {
    var active = document.activeElement;
    if (active && active.classList && active.classList.contains('player-name')) {
      focusedInputId = active.dataset.pid;
      caretPos = active.selectionStart;
    } else { focusedInputId = null; }

    var ids = Object.keys(players).sort(function(a, b) {
      return (players[a].order || 0) - (players[b].order || 0);
    });

    var list;
    if (ids.length === 0) {
      list = '<div class="empty">' +
             (isAdmin ? 'Ajoute un joueur pour commencer'
                      : 'Aucun joueur — l\'admin doit en ajouter') +
             '</div>';
    } else {
      list = ids.map(function(pid) {
        var p = players[pid];
        var f = formatScore(p.score || 0);
        var hole = p.hole || 1;
        var safeName = (p.name || '').replace(/"/g, '&quot;');
        var delBtn = isAdmin
          ? '<button class="btn btn-del" data-act="del" data-pid="' + pid + '">✕</button>'
          : '';
        var nameAttr = isAdmin ? 'data-act="rename"' : 'readonly';
        return '' +
          '<div class="player">' +
            '<div class="row">' +
              delBtn +
              '<input class="player-name" value="' + safeName + '" ' +
                     'data-pid="' + pid + '" ' + nameAttr + '>' +
            '</div>' +
            '<div class="row">' +
              '<div class="group">' +
                '<span class="label">Trou</span>' +
                '<button class="btn btn-hole" data-act="hole" data-pid="' + pid + '" data-d="-1">−</button>' +
                '<div class="display hole-display">' + hole + '</div>' +
                '<button class="btn btn-hole" data-act="hole" data-pid="' + pid + '" data-d="1">+</button>' +
              '</div>' +
              '<div class="group">' +
                '<span class="label">Score</span>' +
                '<button class="btn btn-down" data-act="score" data-pid="' + pid + '" data-d="-1">−</button>' +
                '<div class="display ' + f.cls + '">' + f.text + '</div>' +
                '<button class="btn btn-up" data-act="score" data-pid="' + pid + '" data-d="1">+</button>' +
              '</div>' +
            '</div>' +
          '</div>';
      }).join('');
    }

    var codeDisplay = isAdmin
      ? sessionCode + '<span style="opacity:.5">·</span>' + adminSecret
      : sessionCode;
    var roleBadge = isAdmin
      ? '<span class="role-badge role-admin">ADMIN</span>'
      : '<span class="role-badge role-view">SPECTATEUR</span>';
    var resetBtn = isAdmin
      ? '<button id="btnReset">🆕 Nouvelle partie</button>'
      : '';
    var addRow = isAdmin
      ? '<div class="add-row">' +
          '<input id="newName" type="text" placeholder="Nom du joueur" maxlength="20">' +
          '<button id="btnAdd">+ Ajouter</button>' +
        '</div>'
      : '';

    appEl.innerHTML =
      '<div class="session-bar">' +
        roleBadge +
        '<span class="session-code">' + codeDisplay + '</span>' +
        '<button id="btnShare">📤</button>' +
        '<button id="btnLeave">Quitter</button>' +
      '</div>' +
      '<div class="status"><span class="dot"></span>Connecté en temps réel</div>' +
      addRow +
      '<div id="players">' + list + '</div>' +
      '<div class="footer">' +
        resetBtn +
        '<button id="btnShare2">📤 Partager</button>' +
      '</div>';

    if (focusedInputId) {
      var elFocus = document.querySelector('.player-name[data-pid="' + focusedInputId + '"]');
      if (elFocus) {
        elFocus.focus();
        try { elFocus.setSelectionRange(caretPos, caretPos); } catch(e) {}
      }
    }

    if (isAdmin) {
      document.getElementById('btnAdd').onclick = addPlayer;
      document.getElementById('newName').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addPlayer();
      });
      document.getElementById('btnReset').onclick = resetScores;
    }
    document.getElementById('btnShare').onclick  = openShareModal;
    document.getElementById('btnShare2').onclick = openShareModal;
    document.getElementById('btnLeave').onclick  = leaveSession;

    document.getElementById('players').addEventListener('click', function(e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      var pid = btn.dataset.pid;
      var act = btn.dataset.act;
      if (act === 'del'   && isAdmin) removePlayer(pid);
      if (act === 'score')            changeScore(pid, parseInt(btn.dataset.d));
      if (act === 'hole')             changeHole(pid, parseInt(btn.dataset.d));
    });
    document.getElementById('players').addEventListener('change', function(e) {
      if (e.target.dataset && e.target.dataset.act === 'rename' && isAdmin) {
        renamePlayer(e.target.dataset.pid, e.target.value);
      }
    });
  }

  // ============================================================
  //  ACTIONS Firebase
  // ============================================================
  function addPlayer() {
    if (!isAdmin) return;
    var input = document.getElementById('newName');
    var name = input.value.trim();
    if (!name) return;
    var maxOrder = 0;
    for (var k in players) if (players[k].order > maxOrder) maxOrder = players[k].order;
    var newRef = db.ref('golfSessions/' + sessionCode + '/players').push();
    newRef.set({ name: name, score: 0, hole: 1, order: maxOrder + 1 });
    input.value = '';
  }
  function removePlayer(pid) {
    if (!isAdmin) return;
    if (!confirm('Supprimer ' + (players[pid] && players[pid].name ? players[pid].name : '?') + ' ?')) return;
    db.ref('golfSessions/' + sessionCode + '/players/' + pid).remove();
  }
  function renamePlayer(pid, name) {
    if (!isAdmin) return;
    var v = name.trim();
    if (!v) return;
    db.ref('golfSessions/' + sessionCode + '/players/' + pid).update({ name: v });
  }
  function changeScore(pid, d) {
    var cur = (players[pid] && players[pid].score) || 0;
    db.ref('golfSessions/' + sessionCode + '/players/' + pid).update({ score: cur + d });
  }
  function changeHole(pid, d) {
    var h = ((players[pid] && players[pid].hole) || 1) + d;
    if (h < 1) h = 1;
    if (h > 18) h = 18;
    db.ref('golfSessions/' + sessionCode + '/players/' + pid).update({ hole: h });
  }
  function resetScores() {
    if (!isAdmin) return;
    if (!confirm('Nouvelle partie ?\n\nLes scores ET la liste des joueurs seront effacés.\nLes codes de session restent les mêmes.')) return;
    db.ref('golfSessions/' + sessionCode + '/players').remove();
  }

  // ============================================================
  //  PARTAGE
  // ============================================================
  function openShareModal() {
    currentSpecUrl = buildSpecUrl(sessionCode);
    if (isAdmin) {
      currentAdmUrl = buildAdminUrl(sessionCode, adminSecret);
      document.getElementById('modalSpecLink').textContent = currentSpecUrl;
      document.getElementById('modalAdmLink').textContent  = currentAdmUrl;
      document.getElementById('shareModal').classList.add('show');
    } else {
      var txt = '⛳ Rejoins ma partie de golf\n' + currentSpecUrl;
      if (navigator.share) {
        navigator.share({ title: 'Score Golf', text: txt, url: currentSpecUrl }).catch(function(){});
      } else {
        copyText(currentSpecUrl, 'Lien copié !');
      }
    }
  }
  function closeShareModal() {
    document.getElementById('shareModal').classList.remove('show');
  }
  function copyText(txt, msg) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(
        function() { alert(msg + '\n\n' + txt); },
        function() { alert(txt); }
      );
    } else {
      var ta = document.createElement('textarea');
      ta.value = txt;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); alert(msg); } catch(e) { alert(txt); }
      document.body.removeChild(ta);
    }
  }

  // ============================================================
  //  DÉMARRAGE
  // ============================================================
  function start() {
    var params = new URLSearchParams(location.search);
    var fromSpec = params.get('s');
    var fromAdm  = params.get('a');
    if (!fromSpec) fromSpec = params.get('session'); // compat
    if (fromSpec && fromSpec.length === 4) {
      joinSession(fromSpec.toUpperCase(), fromAdm);
    } else {
      var lastSpec = null, lastAdm = null;
      try {
        lastSpec = localStorage.getItem('lastGolfSession');
        lastAdm  = localStorage.getItem('lastGolfAdmin');
      } catch(e) {}
      if (lastSpec) joinSession(lastSpec, lastAdm);
      else          renderWelcome();
    }
    showInstallBanner();
  }
  start();
</script>
</body>
</html>
