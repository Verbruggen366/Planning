<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verbuggen — Planning Semaine (PC)</title>
<style>
:root{--bleu:#1a3a5c;--bleu2:#2563eb;--r:8px;--sh:0 2px 8px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1e293b;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit;cursor:text}

/* HEADER */
#hdr{background:var(--bleu);color:#fff;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#hdr h1{font-size:15px;font-weight:700}
.wnav{display:flex;align-items:center;gap:6px;margin-left:16px}
.wnav button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:5px;padding:4px 10px;font-size:13px}
.wnav button:hover{background:rgba(255,255,255,.35)}
#winfo{font-size:11px;color:rgba(255,255,255,.8);min-width:110px;text-align:center}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600}
.hdr-btn:hover{background:rgba(255,255,255,.25)}
.hdr-btn.green{background:#16a34a;border-color:#15803d}
.hdr-btn.purple{background:#7c3aed;border-color:#6d28d9}
#fb-status{font-size:12px;margin-left:4px}

/* HINT BAR */
#hint-bar{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:4px 16px;font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:16px;flex-shrink:0}
#hint-bar b{color:#475569}

/* CLIP BAR */
#clipbar{display:none;padding:6px 16px;font-size:12px;font-weight:600;color:#fff;align-items:center;gap:10px;flex-shrink:0}
#clipbar.on{display:flex}
#clipbar button{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:4px;padding:2px 10px;font-size:12px}

/* TABLE CONTAINER */
#table-wrap{flex:1;overflow:auto}

/* TABLE */
#ptable{border-collapse:collapse;font-size:12px;min-width:900px}
#ptable td.pname,#ptable th.pname{position:sticky;left:0;z-index:10;min-width:120px;max-width:120px;border-right:2px solid #94a3b8}
#ptable th.pname{background:#1a3a5c;z-index:11}
#ptable td.pper,#ptable th.pper{position:sticky;left:120px;z-index:10;background:#f8fafc;min-width:30px;max-width:30px;border-right:1px solid #ddd;font-size:10px;font-weight:800;color:#94a3b8;text-align:center}
#ptable th.pper{background:#1a3a5c;z-index:11;color:#fff}
#ptable th.day-hdr{background:#1a3a5c;color:#fff;text-align:center;font-size:11px;padding:5px 3px;white-space:nowrap;border-left:2px solid #0f2440}
#ptable th.sub-hdr{background:#2c4a6e;color:rgba(255,255,255,.85);text-align:center;font-size:10px;padding:3px;font-weight:600}
#ptable td.dc{padding:3px 5px;border:1px solid #f1f3f6;vertical-align:middle;cursor:pointer;height:26px}
#ptable td.dc:hover{filter:brightness(.95)}
#ptable td.dc.type-col{min-width:32px;max-width:40px;text-align:center;font-size:11px;font-weight:800}
#ptable td.dc.type-col{width:22px;min-width:22px;max-width:22px;text-align:center;font-size:11px;font-weight:800}
#ptable td.dc.info-col{width:22px;min-width:22px;max-width:22px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ptable td.dc.mbl-col{width:22px;min-width:22px;max-width:22px;font-size:10px;color:#6b7280;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ptable td.dc.info-col:not(:empty){max-width:150px;width:auto}
#ptable td.dc.mbl-col:not(:empty){max-width:130px;width:auto}
#ptable{table-layout:fixed}

/* MODAL */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
#ov.on{display:flex}
#modal{background:#fff;border-radius:12px;width:460px;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
#modal h3{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--bleu)}
.mlbl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:5px;letter-spacing:.05em}
.tgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:14px}
.mbtn{padding:8px 4px;border-radius:7px;border:2px solid;font-size:11px;font-weight:700;text-align:center;background:#fff}
.mf{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.mf input{border:1.5px solid #e2e8f0;border-radius:7px;padding:8px 10px;font-size:13px;width:100%;outline:none}
.mf input:focus{border-color:var(--bleu2)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;margin-bottom:12px}
.chip{padding:3px 10px;border-radius:20px;border:1px solid #e2e8f0;font-size:11px;background:#f8fafc;cursor:pointer}
.chip:hover{background:#e0e7ff;border-color:var(--bleu2)}
.color-pick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid #e2e8f0;display:flex;align-items:center;justify-content:center}
.color-swatch:hover{transform:scale(1.1)}
.mact{display:flex;gap:8px;margin-top:14px}
.mact button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;border:none}

#toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:1000;opacity:0;transition:opacity .2s;pointer-events:none}
#toast.on{opacity:1}
</style>
</head>
<body>

<div id="hdr">
  <h1>🪵 Verbuggen — Planning Semaine <span id="wnum">?</span></h1>
  <div class="wnav">
    <button onclick="chWk(-1)">◀◀</button>
    <button onclick="chWk(-1)" title="-1 semaine">◀</button>
    <span id="winfo"></span>
    <button onclick="chWk(1)" title="+1 semaine">▶</button>
    <button onclick="chWk(1)">▶▶</button>
    <button onclick="goToday()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:600">📅 Aujourd'hui</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <span id="fb-status" title="Connexion Firebase">🔴</span>
    <button class="hdr-btn green" onclick="doSaveJSON()">💾 Sauvegarder</button>
    <button class="hdr-btn" onclick="document.getElementById('import-file').click()">📂 Charger</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="doLoadJSON(this)"/>
    <button class="hdr-btn purple" onclick="doPrint()">🖨 Imprimer</button>
  </div>
</div>

<div id="hint-bar">
  <span><b>Clic</b> case remplie → copier</span>
  <span><b>Clic</b> case vide → coller / encoder</span>
  <span><b>Shift+clic</b> ou <b>Dbl-clic</b> → éditer</span>
  <span><b>Alt+clic</b> → supprimer</span>
  <span><b>Ctrl+clic</b> → copier direct</span>
  <span><b>Échap</b> → annuler clipboard</span>
</div>

<div id="clipbar">
  <span id="clip-txt"></span>
  <button onclick="clearClip()">✕ Annuler (Échap)</button>
</div>

<div id="table-wrap">
  <table id="ptable">
    <thead id="pthead"></thead>
    <tbody id="ptbody"></tbody>
  </table>
</div>

<!-- MODAL -->
<div id="ov" onclick="closeOv(event)">
  <div id="modal" onclick="event.stopPropagation()">
    <h3 id="mtitle">Encoder une tâche</h3>
    <div class="mlbl">Type de travail</div>
    <div class="tgrid" id="tgrid"></div>
    <div id="mfwrap">
      <div class="mlbl">Chantier</div>
      <div class="mf">
        <input id="inum" placeholder="N° chantier (ex: 9188)" inputmode="numeric"/>
        <input id="inom" placeholder="Nom client (ex: Delphine)"/>
        <input id="imbl" placeholder="Désignation meuble (ex: Cuisine n°3)"/>
      </div>
      <div class="chips" id="chips"></div>
      <div class="mlbl">Couleur du chantier</div>
      <div class="color-pick" id="color-picker"></div>
    </div>
    <div class="mact">
      <button style="background:#fee2e2;color:#dc2626" onclick="clearSlot()">✕ Effacer</button>
      <button style="background:#f1f5f9;color:#64748b" onclick="closeOv()">Annuler (Échap)</button>
      <button style="background:var(--bleu);color:#fff;flex:2" onclick="saveSlot()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── FIREBASE ─────────────────────────────────────────────────
// Charger Firebase SDK dynamiquement
(function(){
  var s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js';
    s2.onload=initFirebase;
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
})();

var db=null, fbConnected=false;
function initFirebase(){
  var cfg={
    apiKey:"AIzaSyAuXW6oBiNPw4W4lZoLPqjpVlLLwA6rt5Q",
    authDomain:"verbruggen-planning.firebaseapp.com",
    databaseURL:"https://verbruggen-planning-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"verbruggen-planning",
    storageBucket:"verbruggen-planning.firebasestorage.app",
    messagingSenderId:"506403938885",
    appId:"1:506403938885:web:2dccdff0b8457036c4392c"
  };
  firebase.initializeApp(cfg);
  db=firebase.database();
  db.ref('.info/connected').on('value',function(s){
    fbConnected=s.val()===true;
    document.getElementById('fb-status').textContent=fbConnected?'🟢':'🔴';
    document.getElementById('fb-status').title=fbConnected?'Firebase connecté':'Hors ligne';
  });
  db.ref('data').on('value',function(s){
    var v=s.val(); if(!v)return;
    if(v.planning)planning=v.planning;
    if(v.pointage)pointage=v.pointage;
    if(v.cColorOverride)cColorOverride=v.cColorOverride;
    if(v.personPins)personPins=v.personPins;
    lsSave(); buildBody();
  });
}
function fbSave(){
  if(!db||!fbConnected)return;
  db.ref('data').set({planning:planning,pointage:pointage,cColorOverride:cColorOverride,personPins:personPins});
}

// ── DATA ─────────────────────────────────────────────────────
var PERS=[
  {id:"david",    nom:"David",          g:"M",poste:"Numerique"},
  {id:"pierre",   nom:"Pierre",          g:"M",poste:"Numerique"},
  {id:"markus",   nom:"Markus",          g:"M",poste:"Numerique"},
  {id:"giovanni", nom:"Giovanni",        g:"M",poste:"Numerique"},
  {id:"tom",      nom:"Tom",             g:"A",poste:"Atelier"},
  {id:"alain",    nom:"Alain",           g:"A",poste:"Atelier"},
  {id:"marco_a",  nom:"Marco",           g:"A",poste:"Atelier"},
  {id:"pierre_a", nom:"Pierre-Antoine",  g:"A",poste:"Atelier"},
  {id:"roberto",  nom:"Roberto",         g:"A",poste:"Atelier"},
  {id:"gaetan",   nom:"Gaetan",          g:"A",poste:"Atelier"},
  {id:"kevin",    nom:"Kevin",           g:"A",poste:"Atelier"},
  {id:"victor",   nom:"Victor",          g:"F",poste:"Finition"},
  {id:"jamal",    nom:"Jamal",           g:"T",poste:"Transport"},
  {id:"marco_t",  nom:"Marco T.",        g:"T",poste:"Transport"},
  {id:"res1",     nom:"Reserve 1",       g:"P",poste:"Pose"},
  {id:"res2",     nom:"Reserve 2",       g:"P",poste:"Pose"},
  {id:"res3",     nom:"Reserve 3",       g:"P",poste:"Pose"}
];
var TYPES=[
  {id:"M",  lbl:"Machine",   col:"#f97316"},
  {id:"A",  lbl:"Atelier",   col:"#16a34a"},
  {id:"F",  lbl:"Finition",  col:"#dc2626"},
  {id:"T",  lbl:"Transport", col:"#7c3aed"},
  {id:"P",  lbl:"Pose",      col:"#2563eb"},
  {id:"CE", lbl:"Chomage",   col:"#94a3b8"},
  {id:"V",  lbl:"Vacances",  col:"#f59e0b"},
  {id:"B",  lbl:"Bureau",    col:"#64748b"}
];
var GCOL={M:"#f97316",A:"#16a34a",F:"#dc2626",T:"#7c3aed",P:"#2563eb",CE:"#94a3b8",V:"#f59e0b",B:"#64748b"};
var DAYS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
var PERS_PER=["AM1","AM2","PM1","PM2"];
var PLBLS=["AM","AM","PM","PM"];
var NOCH={CE:1,V:1,B:1};
var NOCH_COLOR={CE:{bg:"#fee2e2",fg:"#991b1b",brd:"#dc2626"},V:{bg:"#fef9c3",fg:"#713f12",brd:"#ca8a04"},B:{bg:"#e2e8f0",fg:"#334155",brd:"#64748b"}};
var PALETTE=[
  {bg:"#dbeafe",fg:"#1e3a8a",brd:"#2563eb"},{bg:"#d1fae5",fg:"#065f2e",brd:"#16a34a"},
  {bg:"#fef9c3",fg:"#713f12",brd:"#ca8a04"},{bg:"#ede9fe",fg:"#3b0764",brd:"#7c3aed"},
  {bg:"#ccfbf1",fg:"#134e4a",brd:"#0d9488"},{bg:"#fde8d0",fg:"#7c3a00",brd:"#f97316"},
  {bg:"#e0f2fe",fg:"#0c4a6e",brd:"#0284c7"},{bg:"#fce7f3",fg:"#831843",brd:"#db2777"},
  {bg:"#dcfce7",fg:"#14532d",brd:"#22c55e"},{bg:"#fef3c7",fg:"#78350f",brd:"#f59e0b"},
  {bg:"#f3e8ff",fg:"#581c87",brd:"#a855f7"},{bg:"#ecfeff",fg:"#164e63",brd:"#06b6d4"}
];

// ── STATE ────────────────────────────────────────────────────
var wkMon=null, editSlot=null, selType=null, selColorIdx=null;
var clip=null, clipKey=null;
var planning={}, pointage={}, cColorOverride={}, personPins={};
var cColorMap={}, cColorNext=0;

// ── UTILS ────────────────────────────────────────────────────
function getMonday(d){var dt=new Date(d);dt.setHours(0,0,0,0);var dow=dt.getDay(),diff=dow===0?-6:1-dow;dt.setDate(dt.getDate()+diff);return dt;}
function isoWeek(d){var t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);var w1=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-w1)/86400000-(3-(w1.getDay()+6)%7))/7);}
function fmtD(d,s){if(s)return d.toLocaleDateString("fr-BE",{day:"2-digit",month:"2-digit"});return d.toLocaleDateString("fr-BE",{weekday:"short",day:"2-digit",month:"2-digit"});}
function dayDate(i){var d=new Date(wkMon);d.setDate(d.getDate()+i);return d;}
function wkKey(){return wkMon.toISOString().slice(0,10);}
function tcol(id){return GCOL[id]||"#999";}
function tinfo(id){for(var i=0;i<TYPES.length;i++)if(TYPES[i].id===id)return TYPES[i];return{id:id,lbl:id,col:"#999"};}
function pinfo(id){for(var i=0;i<PERS.length;i++)if(PERS[i].id===id)return PERS[i];return PERS[0];}
function skey(pid,di,per){return pid+"|"+di+"|"+per;}
function cColor(num){
  if(!num)return null;
  if(num.toUpperCase()==="CE")return{bg:"#fee2e2",fg:"#991b1b",brd:"#dc2626"};
  if(cColorOverride[num]!==undefined)return PALETTE[cColorOverride[num]%PALETTE.length];
  if(cColorMap[num]===undefined){cColorMap[num]=cColorNext%PALETTE.length;cColorNext++;}
  return PALETTE[cColorMap[num]];
}
function lsSave(){try{localStorage.setItem("vb_pc_plan",JSON.stringify(planning));localStorage.setItem("vb_pc_colors",JSON.stringify(cColorOverride));}catch(e){}}
function lsLoad(){try{var p=localStorage.getItem("vb_pc_plan");if(p)planning=JSON.parse(p);var r=localStorage.getItem("vb_pc_colors");if(r)cColorOverride=JSON.parse(r);}catch(e){}}
function getSlot(pid,di,per){var w=wkKey();if(!planning[w]||!planning[w][pid]||!planning[w][pid][di])return null;return planning[w][pid][di][per]||null;}
function setSlot(pid,di,per,val){var w=wkKey();if(!planning[w])planning[w]={};if(!planning[w][pid])planning[w][pid]={};if(!planning[w][pid][di])planning[w][pid][di]={};planning[w][pid][di][per]=val;lsSave();fbSave();}
function recentSlots(){var seen={},res=[];for(var w in planning)for(var pid in planning[w])for(var di in planning[w][pid])for(var per in planning[w][pid][di]){var s=planning[w][pid][di][per];if(s&&s.num&&!seen[s.num]){seen[s.num]=1;res.push(s);}}return res.slice(0,10);}

// ── HEADER ───────────────────────────────────────────────────
function updateHeader(){
  document.getElementById("wnum").textContent=isoWeek(wkMon);
  var fri=new Date(wkMon);fri.setDate(fri.getDate()+4);
  document.getElementById("winfo").textContent=fmtD(wkMon,true)+" – "+fmtD(fri,true);
}
function chWk(d){wkMon=new Date(wkMon);wkMon.setDate(wkMon.getDate()+d*7);updateHeader();buildTable();}
function goToday(){wkMon=getMonday(new Date());updateHeader();buildTable();}

// ── CLIPBOARD ────────────────────────────────────────────────
function clearClip(){clip=null;clipKey=null;document.getElementById("clipbar").classList.remove("on");buildBody();}
function showClipBar(){
  if(!clip){document.getElementById("clipbar").classList.remove("on");return;}
  var t=tinfo(clip.type);
  document.getElementById("clip-txt").textContent="📋 Copié : "+clip.type+(clip.num?" · "+clip.num+" "+clip.nom:"")+" — Cliquez une case pour coller";
  document.getElementById("clipbar").style.background=t.col;
  document.getElementById("clipbar").classList.add("on");
}

// ── EVENTS ───────────────────────────────────────────────────
document.addEventListener("click",function(e){
  var td=e.target.closest("td[data-pid]"); if(!td)return;
  handleClick(e,td.dataset.pid,parseInt(td.dataset.di),td.dataset.per);
});
document.addEventListener("dblclick",function(e){
  var td=e.target.closest("td[data-pid]"); if(!td)return;
  openModal(td.dataset.pid,parseInt(td.dataset.di),td.dataset.per);
});
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){
    if(document.getElementById("ov").classList.contains("on"))closeOv();
    else if(clip)clearClip();
  }
});

function handleClick(e,pid,di,per){
  var slot=getSlot(pid,di,per),key=skey(pid,di,per);
  if(e.altKey){if(!slot){toast("Case vide");return;}setSlot(pid,di,per,null);buildBody();toast("🗑 Supprimé");return;}
  if(e.shiftKey){openModal(pid,di,per);return;}
  if(e.ctrlKey||e.metaKey){if(!slot){toast("Rien à copier");return;}clip=JSON.parse(JSON.stringify(slot));clipKey=key;showClipBar();buildBody();toast("📋 Copié");return;}
  if(slot&&!clip){clip=JSON.parse(JSON.stringify(slot));clipKey=key;showClipBar();buildBody();toast("📋 Copié — cliquez pour coller");return;}
  if(clip){if(key===clipKey){clearClip();return;}setSlot(pid,di,per,JSON.parse(JSON.stringify(clip)));buildBody();toast("✓ Collé");return;}
  openModal(pid,di,per);
}

// ── TABLE ────────────────────────────────────────────────────
function rebuildCMap(){cColorMap={};cColorNext=0;var w=wkKey();if(!planning[w])return;for(var pi=0;pi<PERS.length;pi++)for(var di=0;di<6;di++)for(var row=0;row<4;row++){var s=getSlot(PERS[pi].id,di,PERS_PER[row]);if(s&&s.num)cColor(s.num);}}

function buildTable(){buildHead();buildBody();}

function buildHead(){
  var thead=document.getElementById("pthead"); thead.innerHTML="";
  var r1=document.createElement("tr");
  function th(cls,html,bg,extra){var t=document.createElement("th");t.className=cls;if(html)t.innerHTML=html;t.style.cssText="background:"+bg+";"+(extra||"");return t;}
  r1.appendChild(th("pname","Personnel","#1a3a5c","color:#fff;font-size:11px;padding:5px 8px"));
  r1.appendChild(th("pper","","#1a3a5c",""));
  for(var di=0;di<6;di++){
    var d=dayDate(di);
    var t2=th("day-hdr",DAYS[di]+"<br><span style='font-size:10px;font-weight:400;opacity:.8'>"+fmtD(d,true)+"</span>","#1a3a5c","color:#fff");
    t2.colSpan=3; r1.appendChild(t2);
  }
  var r2=document.createElement("tr");
  r2.appendChild(th("pname","","#2c4a6e",""));
  r2.appendChild(th("pper","","#2c4a6e",""));
  for(var di=0;di<6;di++){
    ["Type","N° Client","Meuble"].forEach(function(l,ci){
      var t3=th("sub-hdr",l,"#2c4a6e","color:rgba(255,255,255,.85)");
      if(ci===0)t3.style.borderLeft="2px solid #3a5a7e";
      r2.appendChild(t3);
    });
  }
  thead.appendChild(r1); thead.appendChild(r2);
}

function buildBody(){
  rebuildCMap();
  var tbody=document.getElementById("ptbody"); if(!tbody)return;
  var frag=document.createDocumentFragment();
  for(var pi=0;pi<PERS.length;pi++){
    var p=PERS[pi], col=tcol(p.g);
    for(var row=0;row<4;row++){
      var per=PERS_PER[row], lbl=PLBLS[row];
      var tr=document.createElement("tr");
      if(row===0){
        var td=document.createElement("td"); td.className="pname"; td.rowSpan=4;
        td.style.cssText="background:"+col+"1a;border-left:3px solid "+col+";border-bottom:2px solid "+col+";padding:5px 8px;vertical-align:middle";
        td.innerHTML='<div style="display:flex;align-items:center;gap:6px">'
          +'<div style="width:26px;height:26px;border-radius:50%;background:'+col+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0">'+p.nom[0]+'</div>'
          +'<div><div style="font-weight:700;font-size:12px">'+p.nom+'</div>'
          +'<div style="font-size:10px;color:'+col+';font-weight:600">'+p.g+' · '+p.poste+'</div></div></div>';
        tr.appendChild(td);
      }
      var td2=document.createElement("td"); td2.className="pper";
      td2.style.cssText="background:"+col+"12;color:"+col+";border-bottom:"+(row===3?"2px solid "+col:"1px solid #eee");
      td2.textContent=lbl; tr.appendChild(td2);

      for(var di=0;di<6;di++){
        var slot=getSlot(p.id,di,per), key=skey(p.id,di,per);
        var isSrc=key===clipKey, isTgt=!!(clip&&!isSrc);
        var t=slot?tinfo(slot.type):null, noC=slot&&NOCH[slot.type];
        var cc=slot&&noC?NOCH_COLOR[slot.type]:(slot&&slot.num?cColor(slot.num):null);
        var bg=isTgt&&!isSrc?"#eff6ff":cc?cc.bg:"";
        var fgN=cc?cc.fg:"#1e293b", brd=cc?cc.brd:(t?t.col:"#bbb");
        var shadow=isSrc?"inset 0 0 0 2px #2563eb":"";

        function mkTd(cls){
          var td=document.createElement("td"); td.className="dc "+cls;
          td.dataset.pid=p.id; td.dataset.di=di; td.dataset.per=per;
          td.style.background=bg;
          if(shadow)td.style.boxShadow=shadow;
          if(isTgt&&!isSrc)td.style.outline="1px solid #bfdbfe";
          return td;
        }
        var tdT=mkTd("type-col");
        if(di>0)tdT.style.borderLeft="2px solid "+brd;
        if(slot){var sp=document.createElement("span");sp.style.cssText="font-weight:800;color:"+(cc?cc.fg:t.col);sp.textContent=slot.type;tdT.appendChild(sp);}
        else if(isTgt){var sp=document.createElement("span");sp.style.cssText="color:#2563eb;font-weight:700;font-size:12px";sp.textContent="📋";tdT.appendChild(sp);}
        tr.appendChild(tdT);

        var tdI=mkTd("info-col");
        if(slot&&!noC)tdI.innerHTML="<b style='color:"+fgN+";font-weight:800'>"+slot.num+"</b> <span style='color:"+fgN+";opacity:.85'>"+slot.nom+"</span>";
        else if(slot&&noC)tdI.innerHTML="<b style='color:"+cc.fg+";font-weight:800'>"+slot.type+"</b> <span style='color:"+cc.fg+";opacity:.8'>"+t.lbl+"</span>";
        tr.appendChild(tdI);

        var tdM=mkTd("mbl-col");
        if(slot&&!noC&&slot.mbl){tdM.style.color=fgN;tdM.style.opacity=".85";tdM.textContent=slot.mbl;}
        tr.appendChild(tdM);
      }
      frag.appendChild(tr);
    }
    var sep=document.createElement("tr");
    var sepTd=document.createElement("td"); sepTd.colSpan=20;
    sepTd.style.cssText="height:3px;background:#e2e8f0;padding:0";
    sep.appendChild(sepTd); frag.appendChild(sep);
  }
  tbody.innerHTML=""; tbody.appendChild(frag);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(pid,di,per){
  editSlot={pid:pid,di:di,per:per};
  var slot=getSlot(pid,di,per), p=pinfo(pid);
  selType=slot?slot.type:p.g; selColorIdx=null;
  var lbl=per.indexOf("AM")===0?"Matin":"Après-midi";
  var half=(per==="AM1"||per==="PM1")?"1":"2";
  document.getElementById("mtitle").textContent=p.nom+" — "+DAYS[di]+" "+lbl+" ("+half+")";
  buildTgrid();
  var num=slot&&slot.num?slot.num:"";
  document.getElementById("inum").value=num;
  document.getElementById("inom").value=slot&&slot.nom?slot.nom:"";
  document.getElementById("imbl").value=slot&&slot.mbl?slot.mbl:"";
  updMF(); buildColorPicker(num);
  document.getElementById("inum").oninput=function(){buildColorPicker(this.value.trim());};
  var rc=recentSlots(), chips=document.getElementById("chips"); chips.innerHTML="";
  for(var i=0;i<rc.length;i++){(function(c){
    var sp=document.createElement("span"); sp.className="chip";
    var cc=cColor(c.num); if(cc)sp.style.cssText="background:"+cc.bg+";border-color:"+cc.brd+";color:"+cc.fg;
    sp.textContent=c.num+" "+c.nom;
    sp.onclick=function(){document.getElementById("inum").value=c.num;document.getElementById("inom").value=c.nom;document.getElementById("imbl").focus();buildColorPicker(c.num);};
    chips.appendChild(sp);
  })(rc[i]);}
  document.getElementById("ov").classList.add("on");
  setTimeout(function(){document.getElementById("inum").focus();},100);
}
function buildTgrid(){
  var tg=document.getElementById("tgrid"); tg.innerHTML="";
  TYPES.forEach(function(t){
    var b=document.createElement("button"); b.className="mbtn";
    var on=selType===t.id;
    b.style.cssText="border-color:"+t.col+";background:"+(on?t.col:"#fff")+";color:"+(on?"#fff":t.col);
    b.innerHTML=t.id+"<br><span style='font-size:9px;font-weight:400'>"+t.lbl+"</span>";
    b.onclick=function(){selType=t.id;buildTgrid();updMF();};
    tg.appendChild(b);
  });
}
function updMF(){document.getElementById("mfwrap").style.display=NOCH[selType]?"none":"block";}
function buildColorPicker(num){
  var cp=document.getElementById("color-picker"); cp.innerHTML=""; if(!num)return;
  var curIdx=cColorOverride[num]!==undefined?cColorOverride[num]:(cColorMap[num]!==undefined?cColorMap[num]:null);
  selColorIdx=curIdx;
  PALETTE.forEach(function(c,idx){
    var isOn=idx===curIdx;
    var sw=document.createElement("div"); sw.className="color-swatch";
    sw.style.cssText="background:"+c.bg+";border-color:"+(isOn?c.brd:"#e2e8f0")+";box-shadow:"+(isOn?"0 0 0 2px "+c.brd:"none");
    if(isOn)sw.innerHTML="<span style='font-size:12px;color:"+c.fg+";font-weight:900'>✓</span>";
    sw.onclick=function(){selColorIdx=idx;buildColorPicker(document.getElementById("inum").value.trim()||num);};
    cp.appendChild(sw);
  });
}
function saveSlot(){
  if(!selType){toast("Choisissez un type");return;}
  var noC=NOCH[selType];
  var num=noC?"":document.getElementById("inum").value.trim();
  if(!noC&&num&&num.toUpperCase()!=="CE"&&selColorIdx!==null){cColorOverride[num]=selColorIdx;cColorMap[num]=selColorIdx;}
  var slot={type:selType,num:num,nom:noC?"":document.getElementById("inom").value.trim(),mbl:noC?"":document.getElementById("imbl").value.trim()};
  setSlot(editSlot.pid,editSlot.di,editSlot.per,slot);
  closeOv(); buildBody(); toast("✓ Enregistré");
}
function clearSlot(){setSlot(editSlot.pid,editSlot.di,editSlot.per,null);closeOv();buildBody();toast("🗑 Effacé");}
function closeOv(e){if(e&&e.target!==document.getElementById("ov"))return;document.getElementById("ov").classList.remove("on");}

// ── SAVE / LOAD ──────────────────────────────────────────────
function doSaveJSON(){
  var data={version:2,savedAt:new Date().toISOString(),planning:planning,cColorOverride:cColorOverride};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="planning_S"+isoWeek(wkMon)+"_"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  toast("💾 Planning sauvegardé");
}
function doLoadJSON(input){
  var file=input.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(data.planning)planning=data.planning;
      if(data.cColorOverride)cColorOverride=data.cColorOverride;
      lsSave(); fbSave(); buildBody();
      toast("📂 Planning chargé — "+new Date(data.savedAt).toLocaleString("fr-BE"));
    }catch(e){toast("❌ Fichier invalide");}
  };
  reader.readAsText(file); input.value="";
}

// ── PRINT ────────────────────────────────────────────────────
function doPrint(){
  var wk=isoWeek(wkMon),dates=[];
  for(var i=0;i<6;i++) dates.push(fmtD(dayDate(i),true));
  var head="<tr><th style='background:#1a3a5c;color:#fff;padding:4px 6px;white-space:nowrap'>Personnel</th><th style='background:#1a3a5c'></th>";
  for(var di=0;di<6;di++) head+="<th colspan='3' style='background:#1a3a5c;color:#fff;text-align:center;font-size:8pt;border-left:2px solid #0f2440'>"+DAYS[di]+"<br>"+dates[di]+"</th>";
  head+="</tr><tr><th style='background:#2c4a6e'></th><th style='background:#2c4a6e'></th>";
  for(var di=0;di<6;di++) head+="<th style='background:#2c4a6e;color:#ddd;font-size:7pt;border-left:2px solid #3a5a7e'>Type</th><th style='background:#2c4a6e;color:#ddd;font-size:7pt'>N° Client</th><th style='background:#2c4a6e;color:#ddd;font-size:7pt'>Meuble</th>";
  head+="</tr>";
  var body="";
  for(var pi=0;pi<PERS.length;pi++){
    var p=PERS[pi],col=tcol(p.g);
    for(var row=0;row<4;row++){
      var per=PERS_PER[row],lb=PLBLS[row];
      var nc=row===0?"<td rowspan='4' style='background:"+col+"1a;border-left:3px solid "+col+";padding:3px 6px;vertical-align:middle;font-size:8pt;font-weight:700;white-space:nowrap'>"+p.nom+"<br><span style='font-size:7pt;color:"+col+";font-weight:600'>"+p.poste+"</span></td>":"";
      body+="<tr>"+nc+"<td style='font-size:8pt;font-weight:800;color:"+col+";text-align:center;background:"+col+"12'>"+lb+"</td>";
      for(var di=0;di<6;di++){
        var s=getSlot(p.id,di,per),t=s?tinfo(s.type):null,noC=s&&NOCH[s.type];
        var cc=s&&!noC?cColor(s.num):(s&&noC?NOCH_COLOR[s.type]:null);
        var bg=cc?cc.bg:"#fff",bl=di>0?"border-left:2px solid #ccc;":"";
        body+="<td style='padding:2px 4px;font-size:8pt;background:"+bg+";"+bl+"'>"+(s?"<b style='color:"+(cc?cc.fg:t.col)+"'>"+s.type+"</b>":"")+"</td>";
        body+="<td style='padding:2px 4px;font-size:8pt;background:"+bg+";color:"+(cc?cc.fg:"#333")+"'>"+(s&&!noC?s.num+" "+s.nom:s?t.lbl:"")+"</td>";
        body+="<td style='padding:2px 4px;font-size:8pt;background:"+bg+";color:#666;font-style:italic'>"+(s&&!noC?s.mbl:"")+"</td>";
      }
      body+="</tr>";
    }
    body+="<tr><td colspan='20' style='height:3px;background:#e2e8f0;padding:0'></td></tr>";
  }
  var leg=TYPES.map(function(t){return "<span style='display:inline-flex;align-items:center;gap:3px;margin-right:10px'><span style='background:"+t.col+";color:#fff;font-size:8pt;font-weight:700;padding:1px 6px;border-radius:3px'>"+t.id+"</span><span style='font-size:8pt'>"+t.lbl+"</span></span>";}).join("");
  var printHtml="<!DOCTYPE html><html><head><meta charset='UTF-8'/><title>Planning S"+wk+"</title>"
    +"<style>@page{size:A3 landscape;margin:8mm}body{font-family:Arial;font-size:8pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}table{border-collapse:collapse;width:100%}th,td{vertical-align:middle}</style>"
    +"</head><body>"
    +"<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4mm'>"
    +"<div><b style='font-size:13pt;color:#1a3a5c'>VERBUGGEN — Planning semaine n° "+wk+"</b><br>"
    +"<span style='font-size:9pt;color:#64748b'>"+fmtD(wkMon)+" au "+fmtD(dayDate(5))+"</span></div>"
    +"<div>"+leg+"</div></div>"
    +"<table><thead>"+head+"</thead><tbody>"+body+"</tbody></table></body></html>";
  var win=window.open("","_blank","width=1400,height=800");
  win.document.write(printHtml);win.document.close();
  win.onload=function(){setTimeout(function(){win.focus();win.print();},300);};
}

function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("on");setTimeout(function(){el.classList.remove("on");},2500);}

wkMon=getMonday(new Date());
lsLoad();
updateHeader();
buildTable();
